workflows:
  # ── iOS 构建 (给 iPhone) ──
  ios-build:
    name: 🍎 iOS IPA 构建
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: 获取依赖
        script: flutter pub get
      - name: 构建 iOS (无签名)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - name: 构建完成通知
        notify:
          success: true
          failure: true

  # ── Android 构建 (给安卓) ──
  android-build:
    name: 🤖 Android APK 构建
    environment:
      flutter: stable
    scripts:
      - name: 获取依赖
        script: flutter pub get
      - name: 构建 APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
