name: finapp
description: 个人财务规划管理 - 记账·预算·储蓄·财务自由
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.0
  intl: ^0.18.0
  fl_chart: ^0.63.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2A2540"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
